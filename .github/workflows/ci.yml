name: CI - Build & Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 01. 현재 커밋 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 02. Node.js 세팅(Vercel 기본과 비슷하게 20 사용)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # 03. 의존성 설치 (CI 환경에서는 npm ci가 더 안정적)
      - name: Install dependencies
        run: npm ci

      # 04. 린트(추후 설정하기-미리 작성해둠)
      - name: Run lint
        run: npm run lint --if-present

      # 05. 테스트(추후 jest 넣어두기-미리 작성해둠)
      - name: Run tests
        run: npm test --if-present

      # 06. 빌드(Vite+TS 빌드 확인)
      - name: Build
        run: npm run build
